name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ${{ github.repository_owner }}/dungeon-server

jobs:
  # ── Backend build & test ──
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: dungeon-server
        run: mvn clean package -q

      - name: Run unit tests
        working-directory: dungeon-server
        run: mvn test

  # ── Frontend build ──
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dungeon-web/package-lock.json

      - name: Install dependencies
        working-directory: dungeon-web
        run: npm ci

      - name: Build
        working-directory: dungeon-web
        run: npm run build

  # ── API Integration Tests ──
  integration-test:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start backend server
        working-directory: dungeon-server
        run: |
          mvn spring-boot:run -q &
          sleep 30  # Wait for server to start
          curl -s http://localhost:4010/api/sessions || echo "Waiting for server..."
          sleep 10

      - name: Run API integration tests
        working-directory: dungeon-server
        run: mvn test -Dtest="*IntegrationTest"

      - name: Stop server
        if: always()
        run: pkill -f "spring-boot" || true

  # ── Docker build & push ──
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend, frontend, integration-test]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: dungeon-server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}:latest
